<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Gallery | Chemistry Graphs & Diagrams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <div class="background-pattern"></div>

    <div class="container">
        <header>
            <div class="badge">VISUAL LEARNING 🎨</div>
            <h1>The <span class="gradient-text">Visual Gallery</span></h1>
            <p class="subtitle">Every important graph and diagram from NCERT, simplified for quick recall.</p>
        </header>

        <!-- Chapter Navigation -->
        <nav class="chapter-nav">
            <button class="nav-chip active" onclick="loadChapter('Solid State')">Solid State</button>
            <button class="nav-chip" onclick="loadChapter('Solutions')">Solutions</button>
            <button class="nav-chip" onclick="loadChapter('Electrochemistry')">Electrochemistry</button>
            <button class="nav-chip" onclick="loadChapter('Chemical Kinetics')">Kinetics</button>
            <button class="nav-chip" onclick="loadChapter('p-Block Elements')">p-Block</button>
            <button class="nav-chip" onclick="loadChapter('d & f Block')">d & f Block</button>
            <button class="nav-chip" onclick="loadChapter('Coordination Compounds')">Coordination</button>
            <button class="nav-chip" onclick="loadChapter('Haloalkanes & Haloarenes')">Haloalkanes</button>
            <button class="nav-chip" onclick="loadChapter('Alcohols, Phenols & Ethers')">Alcohols</button>
            <button class="nav-chip" onclick="loadChapter('Aldehydes & Ketones')">Aldehydes</button>
            <button class="nav-chip" onclick="loadChapter('Amines')">Amines</button>
            <button class="nav-chip" onclick="loadChapter('Biomolecules')">Biomolecules</button>
        </nav>

        <main id="gallery-display" class="gallery-grid"></main>

        <footer>
            <p>"A picture is worth a thousand reactions! ❤️" - Pratik</p>
        </footer>
    </div>

    <script src="visual_data.js"></script>
    <script>
        function loadChapter(chapterName) {
            // Update UI chips
            document.querySelectorAll('.nav-chip').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === chapterName || (chapterName.includes(btn.innerText)));
            });

            const container = document.getElementById('gallery-display');
            const data = visualData.find(d => d.chapter === chapterName);

            if (!data) return;

            container.innerHTML = '';

            data.visuals.forEach(v => {
                const card = document.createElement('div');
                card.className = 'gallery-card fade-in';

                card.innerHTML = `
                    <h3>${v.title}</h3>
                    <div class="visual-container">
                        <div class="visual-box ${v.cssClass}">
                            ${v.type === 'graph' ? '<div class="axes"></div>' : ''}
                            <div class="dynamic-content"></div>
                        </div>
                    </div>
                    <p class="description">${v.description}</p>
                `;
                container.appendChild(card);
            });
        }

        // Initial Load
        window.onload = () => loadChapter('Solid State');
    </script>
</body>

</html>
